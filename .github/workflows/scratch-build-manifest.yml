name: Rebuild manifest.json

on:
  push:
    branches: [main]
    paths-ignore:
      - "scratch/data/manifest.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest.json
        run: node scratch/scripts/generate-manifest.js

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/manifest.json
          git diff --quiet --cached || git commit -m "chore: regenerate manifest.json"
          git push
