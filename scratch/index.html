<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Scratch Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="desktop">
  <div id="windows-layer"></div>
</div>

<!-- window template (cloned via JS) -->
<template id="window-template">
  <div class="win" role="dialog">
    <div class="win-titlebar">
      <span class="win-title"></span>
      <div class="win-controls">
        <button class="win-btn win-close" title="Close" aria-label="Close window">&times;</button>
      </div>
    </div>
    <div class="win-body"></div>
    <div class="win-status"></div>
  </div>
</template>

<!-- icon template (cloned via JS) -->
<template id="icon-template">
  <button class="icon" type="button">
    <span class="icon-glyph"></span>
    <span class="icon-label"></span>
  </button>
</template>

<script src="main.js"></script>
</body>
</html>
